name: lecto
description: "Lecto — Votre tracker de lecture personnel et local"
publish_to: 'none'
version: 4.2.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  http: ^1.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

  # UI
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.26.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  source_gen: ^2.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
